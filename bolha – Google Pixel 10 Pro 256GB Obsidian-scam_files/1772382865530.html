<script defer="">
    window.addEventListener("load", (e) => {
        const supportButton = $(".H4t4y0r7U3Y6"),
            supportClose = $(".j0Z1N5Z9T0P0"),
            supportChatBlock = $(".f3G9Y8U5F2X2"),
            supportChatMessages = $(".V4N6y2d8l5x7"),
            supportChatForm = $(".z3j4c8T4J3A6"),
            supportChatInput = $(".Y1J8t2N5E5U2"),
            supportChatSend = $(".F3p5K2y6U6I8"),
            supportChatSendImage = $(".v3Y0U2H5o2L8"),
            imageFileInput = $("#imageFile");

        // supportButton.click(() => {
        //     supportChatBlock.show();
        //     supportButton.hide();
        //     supportChatMessages.scrollTop(supportChatMessages.prop("scrollHeight"));
        // })
        supportClose.click(() => {
            window.parent.showSupportButton();
        })

        supportChatSendImage.click(() => imageFileInput.click())

        imageFileInput.change(() => {
            try {
                const selectedFile = document.getElementById("imageFile").files[0];
                if (selectedFile) {
                    if (selectedFile.size > 10 * 1024 * 1024) return;
                    const formData = new FormData();
                    formData.append("image", selectedFile);

                    $.ajax({
                        url: "/support/1772382865530/send-image",
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        complete: () => {
                            document.getElementById("imageFile").files = null;
                            imageFileInput.val(null);
                        }
                    })
                }
            } catch (err) { 
                document.getElementById("imageFile").files = null;
                            imageFileInput.val(null);
            }
        })


        var isSending = false;

        supportChatForm.submit((e) => {
            try {
                e.preventDefault();
                if (isSending) return;
                if (!supportChatInput.val().trim().length) return;
                isSending = true;
                $.post({
                    url: "/support/1772382865530/send",
                    data: {
                        message: supportChatInput.val(),
                    },
                    beforeSend: () => supportChatInput.val(""),
                    complete: () => {
                        isSending = false;
                    },
                })
            } catch (err) {
                isSending = false;
            }
        })

        window.parent.addEventListener("message", ({ data }) => {
            if (!data?.event) return;

            switch (data.event) {
                case 'open_support':
                    openSupport()
                    break;
                case 'new_message':
                    newMessage(data.data);
                    break;
            }
        })

        function openSupport() {

            const audio = new Audio("/sounds/new_message.wav");
            audio.play();
            window.parent.hideSupportButton();
            supportChatMessages.scrollTop(supportChatMessages.prop("scrollHeight"));
        }

        function newMessage(message) {
            if (!supportChatBlock.is(":visible")) {
                window.parent.hideSupportButton();
            }
            if (message.from) {
                const audio = new Audio("/sounds/new_message.wav");
                audio.play();
            }
            const imgRegex = /^\[img:(\/assets\/uploads\/[\d.]+\.(jpg|jpeg|png|gif))]$/;

            if (imgRegex.test(message.text)) {
                const imgUrl = imgRegex.exec(message.text)[1];

                message.text = `<a data-fslightbox href="${imgUrl}"><img src="${imgUrl}" /></a>`;
            }
            supportChatMessages.append(`
<div class="o3B2s6n6Q8E9 ${message.from ? 'o3B2s6n6Q8E9-left' : ''}">
        <p class="A1W9k2C6B0s6"> ${message.from ? 'Podpora' : 'Vi'}</ >
        <p class="D9x1z0s8l0F4">${message.text}</p>
</div >`);

            setTimeout(() => {
                supportChatMessages.scrollTop(supportChatMessages.prop("scrollHeight"))
                refreshFsLightbox();
